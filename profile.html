<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Cash 4 Houses</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon.png">
    <link rel="stylesheet" href="/src/style.css">
    <link rel="stylesheet" href="/src/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .profile-container { max-width: 800px; margin: 0 auto; background: white; padding: 2.5rem; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .profile-header { display: flex; align-items: center; gap: 2rem; margin-bottom: 2.5rem; border-bottom: 1px solid #f1f5f9; padding-bottom: 2rem; }
        .profile-form { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        .form-group.full-width { grid-column: span 2; }
        .profile-avatar-large { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 4px solid #10b981; }
        .profile-avatar-placeholder { width: 120px; height: 120px; border-radius: 50%; background: #f1f5f9; display: flex; align-items: center; justify-content: center; font-size: 3rem; color: #10b981; border: 4px solid #10b981; }
    </style>
</head>
<body class="dashboard-body">
    <div class="dashboard-container">
        <aside class="dashboard-sidebar">
            <div class="profile-section">
                <div class="profile-pic-container" id="sidebar-avatar-container">
                    <i class="fas fa-user-circle" style="font-size: 80px; color: #10b981; margin-top: 10px; display: block;"></i>
                </div>
                <h3 id="sidebar-user-name">User Name</h3>
                <p id="sidebar-user-role">Resident</p>
            </div>
            <nav class="sidebar-nav">
                <a href="/dashboard.html"><i class="fas fa-th-large"></i> Portfolio</a>
                <a href="/profile.html" class="active"><i class="fas fa-user-edit"></i> My Profile</a>
                <a href="/admin.html" id="admin-nav-link" style="display: none; color: #ef4444;"><i class="fas fa-shield-alt"></i> Admin Panel</a>
            </nav>
            <div class="sidebar-footer">
                <button id="logout-btn" class="btn btn-secondary btn-full"><i class="fas fa-sign-out-alt"></i> Log Out</button>
            </div>
        </aside>

        <main class="dashboard-main">
            <header class="dash-top-bar">
                <h1>Manage My Identity</h1>
                <div class="top-bar-right">
                    <div id="portal-date" class="header-date">Tuesday 7th of April 2026</div>
                </div>
            </header>

            <div class="profile-container">
                <div class="profile-header">
                    <div id="avatar-preview-wrap">
                        <i class="fas fa-user-circle profile-avatar-placeholder"></i>
                    </div>
                    <div>
                        <h2>Account Settings</h2>
                        <p style="color: #64748b;">Update your profile picture and contact details.</p>
                        <input type="file" id="avatar-input" accept="image/*" style="display: none;">
                        <button onclick="document.getElementById('avatar-input').click()" class="btn btn-sm btn-outline" style="margin-top: 10px;">Change Avatar</button>
                    </div>
                </div>

                <form id="profile-form" class="profile-form">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" name="displayName" id="prof-name" placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label>Mobile Number</label>
                        <input type="tel" name="mobile" id="prof-mobile" placeholder="07123 456789">
                    </div>
                    <div class="form-group full-width">
                        <label>Home Address</label>
                        <input type="text" name="address" id="prof-address" placeholder="123 High Street, Southend">
                    </div>
                    <div class="form-group">
                        <label>Home Email Address</label>
                        <input type="email" name="homeEmail" id="prof-home-email" placeholder="john@home.com">
                    </div>
                    <div class="form-group">
                        <label>Work Email Address</label>
                        <input type="email" name="workEmail" id="prof-work-email" placeholder="john.doe@work.co.uk">
                    </div>
                    <div class="form-group full-width" style="margin-top: 1rem;">
                        <button type="submit" class="btn btn-primary" id="save-profile-btn">Save Character Profile</button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script type="module" src="/src/profile.js"></script>
    <script type="module">
        import { initLiveDate } from '/src/date-helper.js';
        initLiveDate('portal-date');
    </script>
</body>
</html>
