<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Property Dashboard | Cash 4 Houses</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon.png">
    <link rel="stylesheet" href="/src/style.css">
    <link rel="stylesheet" href="/src/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="dashboard-body">
    <div class="dashboard-container">
        <aside class="dashboard-sidebar">
            <div class="profile-section">
                <div class="profile-pic-container" id="profile-pic-container">
                    <i class="fas fa-user-circle" style="font-size: 80px; color: #10b981; margin-top: 10px; display: block;"></i>
                    <label for="profile-upload" class="upload-badge"><i class="fas fa-camera"></i></label>
                    <input type="file" id="profile-upload" accept="image/*" style="display: none;">
                </div>
                <h3 id="dash-user-name">Loading...</h3>
                <p id="user-email">...</p>
            </div>
            
            <nav class="sidebar-nav">
                <a href="#" class="active"><i class="fas fa-th-large"></i> Portfolio</a>
                <a href="/#get-offer"><i class="fas fa-plus"></i> Add Property</a>
                <a href="#"><i class="fas fa-newspaper"></i> Market News</a>
                <a href="#"><i class="fas fa-envelope"></i> Messages</a>
                <a href="#"><i class="fas fa-cog"></i> Settings</a>
            </nav>

            <div class="sidebar-footer">
                <button id="logout-btn" class="btn btn-secondary btn-full"><i class="fas fa-sign-out-alt"></i> Log Out</button>
            </div>
        </aside>

        <main class="dashboard-main">
            <header class="dash-top-bar">
                <a href="/" class="logo" style="display: none;">
                    <img src="/logo.jpg" alt="Logo" style="height: 50px;">
                </a>
                <h1>My Property Portfolio</h1>
                <div class="top-bar-right">
                    <div id="portal-date" class="header-date">Tuesday 7th of April 2026</div>
                </div>
            </header>

            <section class="dashboard-header">
                <h2>Welcome back!</h2>
                <p>Manage your property inquiries and view active cash offers below.</p>
            </section>

            <section class="properties-grid" id="properties-list">
                <!-- Property cards will be injected here -->
                <div class="loading">
                    <i class="fas fa-spinner fa-spin"></i> Loading your properties...
                </div>
            </section>

            <section class="dashboard-actions">
                <a href="/#get-offer" class="btn btn-primary">Add Another Property</a>
            </section>
        </main>
    </div>

    <script type="module" src="/src/dashboard.js"></script>
    <script type="module">
        import { initLiveDate } from '/src/date-helper.js';
        initLiveDate('portal-date');
    </script>
</body>
</html>
